syntax = "proto3";

package gymcraft.gym.observation;

option java_multiple_files = true;
option java_package = "io.github.mousemeya.gymcraft.gym.observation.proto";
option java_outer_classname = "InventoryProto";

message ProtoItemStackView {
  string item_id = 1;
  int32 count = 2;
  int32 slot = 3;
  bool empty = 4;
}
