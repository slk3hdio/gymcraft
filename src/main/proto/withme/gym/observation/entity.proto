syntax = "proto3";

package withme.gym.observation;

option java_multiple_files = true;
option java_package = "io.github.mousemeya.withme.gym.observation.proto";
option java_outer_classname = "EntityProto";

message ProtoEntityView {
  int32 entity_id = 1;
  string entity_type = 2;
  string uuid = 3;
  double x = 4;
  double y = 5;
  double z = 6;
  double distance = 7;
  bool living = 8;
  bool hostile = 9;
  bool ally = 10;
  bool player = 11;
  bool item = 12;
}
