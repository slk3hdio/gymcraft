syntax = "proto3";

package withme.gym.observation;

import "withme/gym/observation/entity.proto";
import "withme/gym/observation/inventory.proto";

option java_multiple_files = true;
option java_package = "io.github.mousemeya.withme.gym.observation.proto";
option java_outer_classname = "ComponentsProto";

message ProtoSelfState {
  string entity_type = 1;
  string uuid = 2;
  double health = 3;
  double max_health = 4;
  double x = 5;
  double y = 6;
  double z = 7;
  double vx = 8;
  double vy = 9;
  double vz = 10;
  float yaw = 11;
  float pitch = 12;
  bool on_ground = 13;
  bool in_water = 14;
  bool in_lava = 15;
  bool alive = 16;
  bool navigating = 17;
  bool at_target = 18;
  int32 target_entity_id = 19;
  string control_mode = 20;
}

message ProtoNearbyEntities {
  repeated EntityView entities = 1;
}

message BlockView {
  int32 x = 1;
  int32 y = 2;
  int32 z = 3;
  string block_id = 4;
  double distance = 5;
}

message ProtoNearbyBlocks {
  repeated BlockView blocks = 1;
}

message ProtoInventory {
  repeated ItemStackView slots = 1;
}

message ProtoWorldState {
  int64 day_time = 1;
  bool raining = 2;
  bool thundering = 3;
  string dimension = 4;
}
